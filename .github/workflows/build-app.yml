name: Build Android App (APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Assemble Phone Release)
      run: ./gradlew assemblePhoneRelease --no-daemon

    - name: Upload APK Release
      uses: actions/upload-artifact@v4
      with:
        name: JhopanStoreVPN-Release-Phone-ARM64
        path: app/build/outputs/apk/phone/release/*.apk
