name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download libbox.aar (from GitHub Releases)
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libbox.aar "https://github.com/jhopan/Build/releases/download/v2.0.2-diet/libbox.aar"
          ls -lh app/libs/libbox.aar

      - name: Build with Gradle (Assemble Phone Release)
        run: ./gradlew assemblePhoneRelease --no-daemon

      - name: Upload APK as Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN_Singbox_APKs
          path: |
            app/build/outputs/apk/phone/release/*arm64-v8a*.apk
            app/build/outputs/apk/phone/release/*armeabi-v7a*.apk
            app/build/outputs/apk/phone/release/*universal*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Prepare release filenames (JhopanStoreVPN_Singbox)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist/release
          cp app/build/outputs/apk/phone/release/app-phone-arm64-v8a-release.apk dist/release/JhopanStoreVPN_Singbox_arm64-v8a.apk
          cp app/build/outputs/apk/phone/release/app-phone-armeabi-v7a-release.apk dist/release/JhopanStoreVPN_Singbox_armeabi-v7a.apk
          cp app/build/outputs/apk/phone/release/app-phone-universal-release.apk dist/release/JhopanStoreVPN_Singbox_universal.apk

      - name: Publish tagged release assets (APK)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: JhopanStoreVPN Singbox ${{ github.ref_name }}
          body: |
            ## JhopanStoreVPN Singbox ${{ github.ref_name }}
            
            Automatically built from commit ${{ github.sha }}
            
            ### 📱 Downloads Available
            - **JhopanStoreVPN_Singbox_arm64-v8a.apk** - For 64-bit Android devices (Recommended)
            - **JhopanStoreVPN_Singbox_armeabi-v7a.apk** - For 32-bit Android devices  
            - **JhopanStoreVPN_Singbox_universal.apk** - All architectures (emulator compatible)
            
            ### 🚀 Installation
            ```bash
            adb install -r JhopanStoreVPN_Singbox_arm64-v8a.apk
            ```
            
            ### ✨ Features
            - Sing-box v1.11.0 native engine
            - VLESS protocol support
            - Kernel TUN interface routing
            - Custom rule management
            - Smart auto-failover
            - Power efficient background service
            
            ---
            
            **Build Info:**
            - Version: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Repository: ${{ github.repository }}
          files: |
            dist/release/JhopanStoreVPN_Singbox_arm64-v8a.apk
            dist/release/JhopanStoreVPN_Singbox_armeabi-v7a.apk
            dist/release/JhopanStoreVPN_Singbox_universal.apk
