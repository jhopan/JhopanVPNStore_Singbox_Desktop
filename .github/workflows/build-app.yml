name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download libbox.aar (from GitHub Releases)
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libbox.aar "https://github.com/jhopan/Build/releases/download/v2.0.2-diet/libbox.aar"
          ls -lh app/libs/libbox.aar

      - name: Build with Gradle (Assemble Phone Release)
        run: ./gradlew assemblePhoneRelease --no-daemon

      - name: Upload APK as Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN_Singbox_APKs
          path: |
            app/build/outputs/apk/phone/release/*arm64-v8a*.apk
            app/build/outputs/apk/phone/release/*armeabi-v7a*.apk
            app/build/outputs/apk/phone/release/*universal*.apk
          retention-days: 30
