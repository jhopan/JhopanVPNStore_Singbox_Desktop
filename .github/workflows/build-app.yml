name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download libbox.aar (from GitHub Releases)
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libbox.aar "https://github.com/jhopan/Build/releases/download/v2.0.2-diet/libbox.aar"
          ls -lh app/libs/libbox.aar

      - name: Build with Gradle (Assemble Phone Release)
        run: ./gradlew assemblePhoneRelease --no-daemon

      - name: Upload APK as Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: JhopanStoreVPN_Singbox_APKs
          path: |
            app/build/outputs/apk/phone/release/*arm64-v8a*.apk
            app/build/outputs/apk/phone/release/*armeabi-v7a*.apk
            app/build/outputs/apk/phone/release/*universal*.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download libbox.aar
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libbox.aar "https://github.com/jhopan/Build/releases/download/v2.0.2-diet/libbox.aar"

      - name: Build APK for Release
        run: |
          ./gradlew assemblePhoneRelease --no-daemon

      - name: Create GitHub Release with APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            app/build/outputs/apk/phone/release/app-phone-arm64-v8a-release.apk \
            app/build/outputs/apk/phone/release/app-phone-armeabi-v7a-release.apk \
            app/build/outputs/apk/phone/release/app-phone-universal-release.apk \
            --title "JhopanStoreVPN Singbox $TAG_NAME" \
            --notes "## JhopanStoreVPN Singbox $TAG_NAME

          Automatically built from commit ${{ github.sha }}
          
          ### 📱 Downloads Available
          - **arm64-v8a.apk** - For 64-bit Android devices (Recommended)
          - **armeabi-v7a.apk** - For 32-bit Android devices  
          - **universal.apk** - All architectures (emulator compatible)
          
          ### 🚀 Installation
          \`\`\`bash
          adb install -r app-phone-arm64-v8a-release.apk
          \`\`\`
          
          ### ✨ Features
          - Sing-box v1.11.0 native engine
          - VLESS protocol support
          - Kernel TUN interface routing
          - Custom rule management
          - Smart auto-failover
          - Power efficient background service
          
          ---
          
          **Build Info:**
          - Commit: ${{ github.sha }}
          - Repository: ${{ github.repository }}"
