name: Release APK to GitHub Releases

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download libbox.aar (from GitHub Releases)
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libbox.aar "https://github.com/jhopan/Build/releases/download/v2.0.2-diet/libbox.aar"
          ls -la app/libs/libbox.aar

      - name: Build with Gradle (Assemble Phone Release)
        run: ./gradlew assemblePhoneRelease --no-daemon

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: JhopanStoreVPN Singbox ${{ github.ref_name }}
          body: |
            # JhopanStoreVPN Singbox Release ${{ github.ref_name }}
            
            Automatically built from commit ${{ github.sha }}
            
            ## 📱 Available Downloads
            - **arm64-v8a**: For 64-bit Android devices (Recommended)
            - **armeabi-v7a**: For 32-bit Android devices
            - **universal**: Combined APK with all architectures
            
            ## 🔧 Installation
            ```bash
            adb install -r JhopanStoreVPN_Singbox_arm64-v8a.apk
            ```
            
            ## 📝 Features
            - Sing-box v1.11.0 core (native Go)
            - VLESS protocol support
            - Kernel TUN interface routing
            - Custom rule management
            - Smart auto-failover
            - Power efficient design
          draft: false
          prerelease: false

      - name: Upload arm64-v8a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/phone/release/app-phone-arm64-v8a-release.apk
          asset_name: JhopanStoreVPN_Singbox_arm64-v8a.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload armeabi-v7a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/phone/release/app-phone-armeabi-v7a-release.apk
          asset_name: JhopanStoreVPN_Singbox_armeabi-v7a.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload universal APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/phone/release/app-phone-universal-release.apk
          asset_name: JhopanStoreVPN_Singbox_universal.apk
          asset_content_type: application/vnd.android.package-archive
