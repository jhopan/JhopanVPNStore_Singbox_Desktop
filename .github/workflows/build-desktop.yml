name: Build Desktop App (Windows, macOS, Linux)

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop (64-bit)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build Windows Executable
        run: |
          `$env:GOOS = "windows"
          `$env:GOARCH = "amd64"
          `$env:CGO_ENABLED = "0"
          
          go build -ldflags="-s -w -H windowsgui" -o dist/jhopan-vpn-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-windows-amd64
          path: dist/jhopan-vpn-windows-amd64.exe

  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build macOS Executable
        run: |
          export GOOS=darwin GOARCH=`${{ matrix.arch }}` CGO_ENABLED=0
          go build -ldflags="-s -w" -o dist/jhopan-vpn-macos-`${{ matrix.arch }}` .

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-macos-`${{ matrix.arch }}`
          path: dist/jhopan-vpn-macos-`${{ matrix.arch }}`

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build Linux Executable
        run: |
          export GOOS=linux GOARCH=`${{ matrix.arch }}` CGO_ENABLED=0
          go build -ldflags="-s -w" -o dist/jhopan-vpn-linux-`${{ matrix.arch }}` .

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-linux-`${{ matrix.arch }}`
          path: dist/jhopan-vpn-linux-`${{ matrix.arch }}`

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JhopanStoreVPN `${{ github.ref_name }}`
          body: |
            # JhopanStoreVPN Desktop
            Cross-platform VPN app with Sing-box engine
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: `${{ secrets.GITHUB_TOKEN }}`
