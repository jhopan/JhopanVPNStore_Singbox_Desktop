name: Build Desktop App (Windows, macOS, Linux)

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            msystem: MINGW64
            mingw_pkg: mingw-w64-x86_64-gcc
          - arch: 386
            msystem: MINGW32
            mingw_pkg: mingw-w64-i686-gcc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: ${{ matrix.mingw_pkg }}

      - name: Build Windows Executable
        shell: msys2 {0}
        run: |
          mkdir -p dist
          export GOOS=windows GOARCH=${{ matrix.arch }} CGO_ENABLED=1
          export CC=gcc
          go build -ldflags="-s -w -H windowsgui" -o "dist/jhopan-vpn-windows-${{ matrix.arch }}.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-windows-${{ matrix.arch }}
          path: dist/jhopan-vpn-windows-${{ matrix.arch }}.exe

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build macOS App + DMG
        run: |
          mkdir -p dist
          export GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1
          go build -ldflags="-s -w" -o dist/jhopan-vpn-macos-${{ matrix.arch }}.bin .

          APP="dist/JhopanStoreVPN-${{ matrix.arch }}.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/jhopan-vpn-macos-${{ matrix.arch }}.bin "$APP/Contents/MacOS/jhopan-vpn"
          chmod +x "$APP/Contents/MacOS/jhopan-vpn"

          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>jhopan-vpn</string>
            <key>CFBundleIdentifier</key>
            <string>com.jhopanstorevpn.app</string>
            <key>CFBundleName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
          </dict>
          </plist>
          EOF

          hdiutil create -volname "JhopanStoreVPN-${{ matrix.arch }}" -srcfolder "$APP" -ov -format UDZO "dist/jhopan-vpn-macos-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-macos-${{ matrix.arch }}
          path: |
            dist/jhopan-vpn-macos-${{ matrix.arch }}.bin
            dist/jhopan-vpn-macos-${{ matrix.arch }}.dmg

  build-linux:
    name: Build Linux + Package (deb/rpm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Install Build and Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            ruby \
            ruby-dev \
            rpm \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev
          sudo gem install --no-document fpm

      - name: Build Linux Executable
        run: |
          mkdir -p dist
          export GOOS=linux GOARCH=amd64 CGO_ENABLED=1
          go build -ldflags="-s -w" -o dist/jhopan-vpn-linux-amd64.bin .

      - name: Build .deb and .rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.0.0-dev"
          fi

          mkdir -p package-root/usr/local/bin
          cp dist/jhopan-vpn-linux-amd64.bin package-root/usr/local/bin/jhopan-vpn
          chmod +x package-root/usr/local/bin/jhopan-vpn

          # Build .deb package
          fpm -s dir -t deb -n jhopan-vpn -v "$VERSION" -a amd64 \
            --description "JhopanStoreVPN Desktop (Ubuntu/Debian package)" \
            --maintainer "jhopan" \
            --url "https://github.com/jhopan/JhopanVPNStore_Singbox_Desktop" \
            -C package-root .

          # Build .rpm package
          fpm -s dir -t rpm -n jhopan-vpn -v "$VERSION" -a x86_64 \
            --description "JhopanStoreVPN Desktop (Fedora/RHEL package)" \
            --maintainer "jhopan" \
            --url "https://github.com/jhopan/JhopanVPNStore_Singbox_Desktop" \
            -C package-root .

          # Rename packages to standardized naming convention
          # FPM .deb output: jhopan-vpn_<VERSION>_amd64.deb (already correct)
          # FPM .rpm output: jhopan-vpn-<VERSION>-<RELEASE>.x86_64.rpm (remove release number)
          DEB_FILE=$(ls jhopan-vpn_*_amd64.deb)
          RPM_FILE=$(ls jhopan-vpn-*-*.x86_64.rpm)
          
          # Rename .deb to standardized format jhopan-vpn_<version>_amd64.deb
          mv "$DEB_FILE" "dist/jhopan-vpn_${VERSION}_amd64.deb"
          
          # Rename .rpm to standardized format jhopan-vpn_<version>.x86_64.rpm
          mv "$RPM_FILE" "dist/jhopan-vpn_${VERSION}.x86_64.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-linux-packages
          path: |
            dist/jhopan-vpn-linux-amd64.bin
            dist/*.deb
            dist/*.rpm

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files

      - name: Delete Existing Release for Same Tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              });
              core.info(`Deleted old release for tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for tag ${tag}`);
              } else {
                throw error;
              }
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JhopanStoreVPN ${{ github.ref_name }}
          body: |
            # JhopanStoreVPN Desktop

            ## Pilih file yang sesuai dengan OS dan arsitektur Anda

            | OS / Perangkat | File yang dipilih | Format | Keterangan |
            | --- | --- | --- | --- |
            | **Windows 64-bit** | `jhopan-vpn-windows-amd64.exe` | .exe | Untuk PC/laptop Windows modern (x86_64) |
            | **Windows 32-bit** | `jhopan-vpn-windows-386.exe` | .exe | Untuk Windows lama 32-bit (i386) |
            | **macOS Intel** | `jhopan-vpn-macos-amd64.dmg` | .dmg | Installer untuk Mac Intel / x86_64 |
            | **macOS Apple Silicon** | `jhopan-vpn-macos-arm64.dmg` | .dmg | Installer untuk Mac M1, M2, M3, dst |
            | macOS Intel (manual) | `jhopan-vpn-macos-amd64.bin` | .bin | Binary langsung untuk Mac Intel |
            | macOS Apple Silicon (manual) | `jhopan-vpn-macos-arm64.bin` | .bin | Binary langsung untuk Mac Apple Silicon |
            | **Ubuntu / Debian** | `jhopan-vpn_*_amd64.deb` | .deb | Installer untuk sistem Debian/Ubuntu 64-bit |
            | **Fedora / RHEL / CentOS** | `jhopan-vpn_*.x86_64.rpm` | .rpm | Installer untuk sistem Fedora/RHEL/CentOS |
            | Linux generic (manual) | `jhopan-vpn-linux-amd64.bin` | .bin | Binary langsung untuk Linux 64-bit |

            ## Naming Convention Penjelasan

            - **Debian (.deb)**: `jhopan-vpn_<version>_amd64.deb` — versi, arsitektur (amd64/arm64 jika ada)
            - **RPM (.rpm)**: `jhopan-vpn_<version>.x86_64.rpm` — versi, arsitektur (x86_64/aarch64 jika ada)
            - **Windows (.exe)**: `jhopan-vpn-windows-<arch>.exe` — windows, arsitektur (amd64/386)
            - **macOS (.dmg)**: `jhopan-vpn-macos-<arch>.dmg` — macos, arsitektur (amd64/arm64)
            - **Manual Binary (.bin)**: `jhopan-vpn-<os>-<arch>.bin` — os, arsitektur

            ## Panduan Instalasi

            - Kalau masih ragu, pilih file **berdasarkan OS dan arsitektur CPU** perangkat Anda
            - Untuk instalasi graphical, gunakan file `.deb`/`.rpm`/`.dmg`/`.exe`
            - Untuk instalasi manual dari command line, gunakan `.bin` file
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
