name: Build Desktop App (Windows, macOS, Linux)

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: C:/msys64/mingw64/bin/gcc.exe
          - arch: 386
            cc: C:/msys64/mingw32/bin/gcc.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-i686-gcc

      - name: Build Windows Executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"
          $env:CGO_ENABLED = "1"
          $env:CC = "${{ matrix.cc }}"

          go build -ldflags="-s -w -H windowsgui" -o "dist/jhopan-vpn-windows-${{ matrix.arch }}.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-windows-${{ matrix.arch }}
          path: dist/jhopan-vpn-windows-${{ matrix.arch }}.exe

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build macOS App + DMG
        run: |
          mkdir -p dist
          export GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1
          go build -ldflags="-s -w" -o dist/jhopan-vpn-macos-${{ matrix.arch }} .

          APP="dist/JhopanStoreVPN-${{ matrix.arch }}.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/jhopan-vpn-macos-${{ matrix.arch }} "$APP/Contents/MacOS/jhopan-vpn"
          chmod +x "$APP/Contents/MacOS/jhopan-vpn"

          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>jhopan-vpn</string>
            <key>CFBundleIdentifier</key>
            <string>com.jhopanstorevpn.app</string>
            <key>CFBundleName</key>
            <string>JhopanStoreVPN</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
          </dict>
          </plist>
          EOF

          hdiutil create -volname "JhopanStoreVPN-${{ matrix.arch }}" -srcfolder "$APP" -ov -format UDZO "dist/jhopan-vpn-macos-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-macos-${{ matrix.arch }}
          path: |
            dist/jhopan-vpn-macos-${{ matrix.arch }}
            dist/jhopan-vpn-macos-${{ matrix.arch }}.dmg

  build-linux:
    name: Build Linux + Package (deb/rpm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Install Build and Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            ruby \
            ruby-dev \
            rpm \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev
          sudo gem install --no-document fpm

      - name: Build Linux Executable
        run: |
          mkdir -p dist
          export GOOS=linux GOARCH=amd64 CGO_ENABLED=1
          go build -ldflags="-s -w" -o dist/jhopan-vpn-linux-amd64 .

      - name: Build .deb and .rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.0.0-dev"
          fi

          mkdir -p package-root/usr/local/bin
          cp dist/jhopan-vpn-linux-amd64 package-root/usr/local/bin/jhopan-vpn
          chmod +x package-root/usr/local/bin/jhopan-vpn

          fpm -s dir -t deb -n jhopan-vpn -v "$VERSION" -a amd64 \
            --description "JhopanStoreVPN Desktop (Ubuntu/Debian package)" \
            --maintainer "jhopan" \
            --url "https://github.com/jhopan/JhopanVPNStore_Singbox_Desktop" \
            -C package-root .

          fpm -s dir -t rpm -n jhopan-vpn -v "$VERSION" -a x86_64 \
            --description "JhopanStoreVPN Desktop (Fedora/RHEL package)" \
            --maintainer "jhopan" \
            --url "https://github.com/jhopan/JhopanVPNStore_Singbox_Desktop" \
            -C package-root .

          mv ./*.deb dist/
          mv ./*.rpm dist/

      - uses: actions/upload-artifact@v4
        with:
          name: jhopan-vpn-linux-packages
          path: |
            dist/jhopan-vpn-linux-amd64
            dist/*.deb
            dist/*.rpm

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files

      - name: Delete Existing Release for Same Tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              });
              core.info(`Deleted old release for tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for tag ${tag}`);
              } else {
                throw error;
              }
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JhopanStoreVPN ${{ github.ref_name }}
          body: |
            # JhopanStoreVPN Desktop

            Build ini berisi paket desktop saja (APK Android tidak dipakai lagi).

            ## Cara pilih file (kapan dipakai)
            - Windows 64-bit: pilih jhopan-vpn-windows-amd64.exe (PC/laptop Windows modern).
            - Windows 32-bit: pilih jhopan-vpn-windows-386.exe (Windows lama 32-bit).
            - macOS Intel: pilih jhopan-vpn-macos-amd64.dmg (Mac Intel).
            - macOS Apple Silicon: pilih jhopan-vpn-macos-arm64.dmg (M1/M2/M3).
            - Ubuntu/Debian: pilih file .deb.
            - Fedora/RHEL/CentOS: pilih file .rpm.

            ## Catatan
            - Jika ingin instal manual Linux tanpa paket manager, gunakan jhopan-vpn-linux-amd64.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
