name: Build libbox.aar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      singbox_version:
        description: 'Sing-box version tag (e.g. v1.11.0)'
        required: false
        default: 'v1.11.0'

env:
  GO_VERSION: '1.23.6'
  SINGBOX_VERSION: 'v1.11.0'
  GOTOOLCHAIN: local
  GOFLAGS: -gcflags=all=-l

jobs:
  build-libbox:
    name: Build libbox.aar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.1.10909125" --channel=3 2>/dev/null || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install gomobile from source
        run: |
          git clone --depth 100 https://github.com/golang/mobile.git golang-mobile
          cd golang-mobile
          git checkout fa514ef
          cd cmd/gomobile && go install
          cd ../gobind && go install
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          echo "GOBIND=$(go env GOPATH)/bin/gobind" >> $GITHUB_ENV

      - name: Determine sing-box version
        run: |
          if [ "${{ github.event.inputs.singbox_version }}" != "" ]; then
            echo "SINGBOX_VERSION=${{ github.event.inputs.singbox_version }}" >> $GITHUB_ENV
          fi
          echo "Building sing-box ${{ env.SINGBOX_VERSION }}"

      - name: Clone sing-box
        run: |
          git clone --depth 1 --branch ${{ env.SINGBOX_VERSION }} https://github.com/SagerNet/sing-box.git singbox-src
          echo "Sing-box source cloned"

      - name: Build libbox.aar
        working-directory: singbox-src
        run: |
          echo "========================================="
          echo "  Building libbox.aar"
          echo "  sing-box: ${{ env.SINGBOX_VERSION }}"
          echo "  Go: $(go version)"
          echo "  Target: android/arm64,android/arm"
          echo "========================================="

          # DEFINITIVE FIX: Use Go Workspaces to link sing-box and golang.org/x/mobile
          # This ensures 'gobind' can resolve the 'bind' package from the source clone
          cd ..
          go work init ./singbox-src ./golang-mobile
          cd singbox-src
          go mod download
          # Diet: only with_utls (for TLS/Vless) and with_gvisor (for standard TUN). 
          # Discard with_quic (removes Hysteria/TUIC/DoQ), with_clash_api, etc.
          # Add -s -w to strip symbols and DWARF debug info for minimal binary size.
          gomobile bind \
            -target=android/arm64,android/arm \
            -androidapi 24 \
            -javapkg=io.github.sagernet \
            -tags="with_utls,with_gvisor" \
            -ldflags="-s -w -buildid= -X github.com/sagernet/sing-box/constant.Version=${{ env.SINGBOX_VERSION }}" \
            -trimpath \
            ./experimental/libbox
          echo "========================================="
          echo "Build complete!"
          ls -lh libbox.aar
          echo "========================================="

      - name: Upload libbox.aar artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: singbox-src/libbox.aar
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "libbox.aar ${{ env.SINGBOX_VERSION }}"
          body: |
            ## libbox.aar (sing-box ${{ env.SINGBOX_VERSION }})

            **Build info:**
            - Go: ${{ env.GO_VERSION }}
            - Targets: `android/arm64`, `android/arm`
            - Tags: `with_utls, with_gvisor (Diet Mode)`

            **Usage:**
            1. Download `libbox.aar` below
            2. Copy to `app/libs/libbox.aar`
            3. Build APK: `./gradlew assemblePhoneDebug`
          files: |
            singbox-src/libbox.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
